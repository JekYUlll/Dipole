<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dipole Web Tester</title>
    <link rel="stylesheet" href="/app/app.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <section class="panel">
          <h1>Dipole Web Tester</h1>
          <p class="muted">以功能测试为主的轻量前端。</p>
          <div class="row">
            <button id="restoreSessionBtn" class="secondary">恢复本地会话</button>
            <button id="logoutBtn" class="danger">退出登录</button>
          </div>
        </section>

        <section class="panel">
          <h2>认证</h2>
          <div class="tabs">
            <button class="tab active" data-auth-tab="login">登录</button>
            <button class="tab" data-auth-tab="register">注册</button>
          </div>
          <form id="loginForm" class="stack">
            <input id="loginTelephone" placeholder="手机号" maxlength="11" required />
            <input id="loginPassword" type="password" placeholder="密码" minlength="6" required />
            <button type="submit">登录</button>
          </form>
          <form id="registerForm" class="stack hidden">
            <input id="registerNickname" placeholder="昵称" minlength="2" maxlength="20" required />
            <input id="registerTelephone" placeholder="手机号" maxlength="11" required />
            <input id="registerPassword" type="password" placeholder="密码" minlength="6" required />
            <input id="registerEmail" type="email" placeholder="邮箱，可选" />
            <button type="submit">注册并登录</button>
          </form>
        </section>

        <section class="panel">
          <h2>当前用户</h2>
          <pre id="currentUserBox" class="codebox">未登录</pre>
        </section>

        <section class="panel">
          <h2>WebSocket</h2>
          <div class="stack">
            <div class="row">
              <input id="wsDevice" value="web" placeholder="device" />
              <input id="wsDeviceId" placeholder="device_id，可选" />
            </div>
            <div class="row">
              <button id="connectWsBtn">连接 WS</button>
              <button id="disconnectWsBtn" class="secondary">断开 WS</button>
            </div>
            <div id="wsStatus" class="status status-idle">未连接</div>
          </div>
        </section>

        <section class="panel">
          <h2>会话</h2>
          <div class="row">
            <button id="reloadConversationsBtn" class="secondary">刷新</button>
            <button id="syncOfflineBtn" class="secondary">补拉离线</button>
          </div>
          <div id="conversationList" class="list"></div>
        </section>

        <details class="panel" open>
          <summary>联系人</summary>
          <div class="row">
            <button id="reloadContactsBtn" class="secondary">刷新</button>
          </div>
          <div id="contactList" class="list"></div>
        </details>

        <details class="panel">
          <summary>好友申请</summary>
          <div class="row">
            <button id="reloadApplicationsBtn" class="secondary">刷新</button>
          </div>
          <h3>收到的申请</h3>
          <div id="incomingApplications" class="list"></div>
          <h3>发出的申请</h3>
          <div id="outgoingApplications" class="list"></div>
        </details>

        <details class="panel">
          <summary>用户搜索 / 发起好友申请</summary>
          <form id="userSearchForm" class="row">
            <input id="userSearchKeyword" placeholder="昵称 / UUID 关键字" />
            <button type="submit">搜索</button>
          </form>
          <div id="userSearchList" class="list"></div>
        </details>

        <details class="panel">
          <summary>群组</summary>
          <form id="createGroupForm" class="stack">
            <input id="createGroupName" placeholder="群名称" maxlength="50" required />
            <textarea id="createGroupNotice" placeholder="群公告，可选"></textarea>
            <input id="createGroupMembers" placeholder="初始成员 UUID，逗号分隔" />
            <button type="submit">创建群聊</button>
          </form>
          <form id="fetchGroupForm" class="row">
            <input id="fetchGroupUUID" placeholder="输入群 UUID 拉取详情" />
            <button type="submit">查询群</button>
          </form>
          <div id="groupList" class="list"></div>
        </details>

        <details class="panel">
          <summary>设备会话</summary>
          <div class="row">
            <button id="reloadDevicesBtn" class="secondary">刷新</button>
            <button id="logoutAllDevicesBtn" class="danger">下线全部设备</button>
          </div>
          <div id="deviceList" class="list"></div>
        </details>
      </aside>

      <main class="main">
        <section class="panel chat-header">
          <div>
            <h2 id="chatTitle">未选择会话</h2>
            <div id="chatMeta" class="muted">请选择会话、联系人或群组开始测试。</div>
          </div>
          <div class="row">
            <button id="loadHistoryBtn" class="secondary">加载更多历史</button>
            <button id="markReadBtn" class="secondary">标记已读</button>
          </div>
        </section>

        <section class="panel chat-messages">
          <div id="messageList" class="message-list"></div>
        </section>

        <section class="panel">
          <h2>发送消息</h2>
          <form id="sendMessageForm" class="stack">
            <textarea id="messageInput" placeholder="输入文本消息"></textarea>
            <div class="row">
              <button type="submit">发送文本</button>
              <button type="button" id="sendFileBtn" class="secondary">上传并发送文件</button>
              <input id="fileInput" type="file" />
            </div>
            <div id="sendHint" class="muted">当前会话未选择。</div>
          </form>
        </section>

        <section class="panel">
          <h2>操作日志</h2>
          <div class="row">
            <button id="clearLogsBtn" class="secondary">清空</button>
          </div>
          <div id="logList" class="log-list"></div>
        </section>
      </main>
    </div>

    <template id="listEmptyTemplate">
      <div class="empty">暂无数据</div>
    </template>

    <script src="/app/app.js"></script>
  </body>
</html>
