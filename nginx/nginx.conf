worker_processes auto;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    # 上游 Dipole 节点池
    # ip_hash 保证同一客户端 IP 始终路由到同一节点，避免 WebSocket 握手被分到不同节点。
    # 跨节点消息投递由 Redis Pub/Sub 兜底，即使不用 ip_hash 也能正常工作。
    upstream dipole_nodes {
        ip_hash;
        server dipole-node1:8080;
        server dipole-node2:8080;
    }

    server {
        listen 80;
        listen [::]:80;

        # WebSocket 反向代理
        # proxy_http_version 1.1 + Upgrade/Connection 头是 WebSocket 升级握手的必要条件
        location /api/v1/ws {
            proxy_pass         http://dipole_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s; # 保持长连接，避免 nginx 超时断开 WS
        }

        # HTTP API 反向代理
        location /api/ {
            proxy_pass       http://dipole_nodes;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 健康检查（可选，用于验证 nginx 本身是否正常）
        location /health {
            proxy_pass http://dipole_nodes;
        }

        # 前端静态资源（Go embed 服务）
        location /app/ {
            proxy_pass       http://dipole_nodes;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 根路径重定向到 /app/
        location = / {
            proxy_pass       http://dipole_nodes;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
