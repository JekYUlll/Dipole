app:
  name: dipole
  env: local

log:
  level: info
  format: console
  development: true
  file_enabled: true
  file_path: logs/dipole.log
  file_rotate_daily: true

server:
  host: 0.0.0.0
  port: 8080

tls:
  enabled: true
  cert_file: certs/local/dipole-local.pem
  key_file: certs/local/dipole-local-key.pem

auth:
  token_ttl_hours: 168
  jwt_secret: dipole-dev-jwt-secret-change-me
  jwt_issuer: dipole

mysql:
  host: 127.0.0.1
  port: 3306
  user: dipole
  password: dipole123
  dbname: dipole

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0

kafka:
  enabled: true
  brokers:
    - 127.0.0.1:9092
  client_id: dipole
  topic_prefix: dipole
  dial_timeout_seconds: 5
  write_timeout_seconds: 5
  consume_retry_max_attempts: 3
  consume_retry_backoff_ms: 500

storage:
  enabled: true
  provider: minio
  endpoint: 127.0.0.1:9000
  access_key: dipoleminio
  secret_key: dipoleminiopass
  use_ssl: false
  bucket: dipole-files
  public_base_url: http://127.0.0.1:9000/dipole-files
  file_max_size_mb: 50
