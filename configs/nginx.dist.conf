worker_processes auto;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    client_max_body_size 6m;
    # 上游 Dipole 节点池
    # ip_hash 保证同一客户端 IP 始终路由到同一节点，避免 WebSocket 握手被分到不同节点。
    # 跨节点消息投递由 Redis Pub/Sub 兜底，即使不用 ip_hash 也能正常工作。
    upstream dipole_nodes {
        ip_hash;
        server dipole-node1:8080;
        server dipole-node2:8080;
        server dipole-node3:8080;
    }

    # HTTP → HTTPS 重定向
    server {
        listen 80;
        listen [::]:80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;

        ssl_certificate     /etc/nginx/certs/local/dipole-local.pem;
        ssl_certificate_key /etc/nginx/certs/local/dipole-local-key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        location /api/v1/ws {
            proxy_pass         http://dipole_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;
        }

        location /api/ {
            proxy_pass       http://dipole_nodes;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            proxy_pass http://dipole_nodes;
        }

        location /app/ {
            proxy_pass       http://dipole_nodes;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = / {
            proxy_pass       http://dipole_nodes;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
